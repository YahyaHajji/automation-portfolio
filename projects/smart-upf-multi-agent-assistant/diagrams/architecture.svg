<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Smart UPF multi-agent assistant architecture</title>
  <desc id="desc">Architecture showing student chat, n8n orchestrator, Redis cache, specialist agents, supervisor validation, PostgreSQL logs, and Grafana dashboards.</desc>
  <defs>
    <style>
      .bg { fill: #f7f5fb; }
      .box { fill: #ffffff; stroke: #3d2f73; stroke-width: 2; rx: 18; }
      .core { fill: #392a69; stroke: #241744; stroke-width: 2; rx: 20; }
      .accent { fill: #b52b72; stroke: #8f1e58; stroke-width: 2; rx: 18; }
      .store { fill: #eef7ff; stroke: #26689a; stroke-width: 2; rx: 18; }
      .text { font-family: Arial, sans-serif; font-size: 22px; fill: #211b33; }
      .small { font-family: Arial, sans-serif; font-size: 17px; fill: #4c435f; }
      .white { fill: #ffffff; }
      .line { stroke: #6d5c95; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke: #b52b72; stroke-width: 3; stroke-dasharray: 8 8; fill: none; marker-end: url(#arrowPink); }
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#6d5c95"/>
    </marker>
    <marker id="arrowPink" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#b52b72"/>
    </marker>
  </defs>
  <rect class="bg" width="1280" height="720"/>
  <text x="60" y="70" class="text" style="font-size:34px;font-weight:700">Smart UPF Multi-Agent Assistant</text>
  <text x="60" y="104" class="small">n8n orchestration with Redis caching, PostgreSQL logging, supervisor validation, and Grafana observability</text>

  <rect x="70" y="175" width="210" height="92" class="box"/>
  <text x="102" y="215" class="text">Student chat</text>
  <text x="102" y="244" class="small">Question or request</text>

  <rect x="365" y="155" width="260" height="130" class="core"/>
  <text x="405" y="205" class="text white">n8n orchestrator</text>
  <text x="405" y="235" class="small white">Normalize, route, and return</text>

  <rect x="730" y="90" width="210" height="90" class="store"/>
  <text x="765" y="130" class="text">Redis cache</text>
  <text x="765" y="157" class="small">Lookup and store</text>

  <rect x="710" y="245" width="250" height="230" class="box"/>
  <text x="750" y="285" class="text">Specialist agents</text>
  <text x="750" y="323" class="small">Reception</text>
  <text x="750" y="352" class="small">Pedagogical</text>
  <text x="750" y="381" class="small">Planning</text>
  <text x="750" y="410" class="small">PFE</text>
  <text x="750" y="439" class="small">Web retrieval</text>

  <rect x="1030" y="245" width="190" height="92" class="store"/>
  <text x="1060" y="285" class="text">Knowledge</text>
  <text x="1060" y="313" class="small">MCP and UPF web</text>

  <rect x="390" y="420" width="245" height="112" class="accent"/>
  <text x="425" y="465" class="text white">Supervisor</text>
  <text x="425" y="494" class="small white">Evaluate answer quality</text>

  <rect x="720" y="565" width="210" height="90" class="store"/>
  <text x="750" y="605" class="text">PostgreSQL</text>
  <text x="750" y="632" class="small">Request logs</text>

  <rect x="1010" y="565" width="190" height="90" class="store"/>
  <text x="1050" y="605" class="text">Grafana</text>
  <text x="1050" y="632" class="small">Dashboards</text>

  <path class="line" d="M280 221 H365"/>
  <path class="line" d="M625 200 C680 170 690 145 730 137"/>
  <path class="line" d="M625 240 C675 285 685 335 710 355"/>
  <path class="line" d="M960 355 H1030"/>
  <path class="line" d="M710 430 C655 435 645 465 635 476"/>
  <path class="line" d="M635 495 C685 555 695 600 720 610"/>
  <path class="line" d="M930 610 H1010"/>
  <path class="dash" d="M835 180 C810 220 800 235 800 245"/>
  <path class="dash" d="M825 565 C840 510 850 485 875 475"/>
</svg>
