<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" role="img" aria-labelledby="title desc">
  <title id="title">AI Email Draft Assistant architecture</title>
  <desc id="desc">Gmail inbox flows through Make.com and Gemini into a Gmail draft, followed by human review and manual sending.</desc>
  <rect width="1200" height="360" rx="24" fill="#f8fafc"/>
  <text x="600" y="55" text-anchor="middle" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#172554">AI Email Draft Assistant</text>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#64748b"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif" text-anchor="middle">
    <g transform="translate(35 115)">
      <rect width="170" height="130" rx="18" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
      <text x="85" y="53" font-size="22" font-weight="700" fill="#991b1b">Gmail Inbox</text>
      <text x="85" y="84" font-size="16" fill="#475569">Watch new email</text>
    </g>
    <g transform="translate(285 115)">
      <rect width="170" height="130" rx="18" fill="#ffffff" stroke="#7c3aed" stroke-width="3"/>
      <text x="85" y="53" font-size="22" font-weight="700" fill="#5b21b6">Make.com</text>
      <text x="85" y="84" font-size="16" fill="#475569">Extract context</text>
    </g>
    <g transform="translate(535 115)">
      <rect width="170" height="130" rx="18" fill="#ffffff" stroke="#2563eb" stroke-width="3"/>
      <text x="85" y="53" font-size="22" font-weight="700" fill="#1d4ed8">Gemini</text>
      <text x="85" y="84" font-size="16" fill="#475569">Generate reply</text>
    </g>
    <g transform="translate(785 115)">
      <rect width="170" height="130" rx="18" fill="#ffffff" stroke="#dc2626" stroke-width="3"/>
      <text x="85" y="53" font-size="22" font-weight="700" fill="#991b1b">Gmail Draft</text>
      <text x="85" y="84" font-size="16" fill="#475569">Save, do not send</text>
    </g>
    <g transform="translate(1035 115)">
      <rect width="130" height="130" rx="18" fill="#ffffff" stroke="#16a34a" stroke-width="3"/>
      <text x="65" y="47" font-size="20" font-weight="700" fill="#166534">Human</text>
      <text x="65" y="74" font-size="20" font-weight="700" fill="#166534">Review</text>
      <text x="65" y="101" font-size="15" fill="#475569">Edit and send</text>
    </g>
  </g>
  <g stroke="#64748b" stroke-width="4" marker-end="url(#arrow)">
    <line x1="210" y1="180" x2="273" y2="180"/>
    <line x1="460" y1="180" x2="523" y2="180"/>
    <line x1="710" y1="180" x2="773" y2="180"/>
    <line x1="960" y1="180" x2="1023" y2="180"/>
  </g>
  <text x="600" y="310" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475569">Automation accelerates drafting. The user keeps control of the final message.</text>
</svg>

